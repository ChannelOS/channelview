<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Protected Report — ChannelView</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:#f8f9fa; display:flex; align-items:center; justify-content:center; min-height:100vh; }
  .card { background:#fff; border-radius:16px; box-shadow:0 4px 24px rgba(0,0,0,.08); padding:48px; max-width:420px; width:100%; text-align:center; }
  .logo { font-size:20px; font-weight:700; color:#111; margin-bottom:8px; }
  .logo span { display:inline-flex; align-items:center; justify-content:center; width:28px; height:28px; background:#0ace0a; color:#fff; border-radius:6px; font-size:14px; margin-right:6px; }
  h2 { font-size:18px; color:#333; margin:16px 0 8px; }
  p { font-size:14px; color:#666; margin-bottom:24px; }
  input { width:100%; padding:12px 16px; border:1px solid #e5e7eb; border-radius:8px; font-size:15px; margin-bottom:16px; }
  input:focus { outline:none; border-color:#0ace0a; box-shadow:0 0 0 3px rgba(10,206,10,.15); }
  button { width:100%; padding:12px; background:#0ace0a; color:#000; border:none; border-radius:8px; font-size:15px; font-weight:600; cursor:pointer; }
  button:hover { background:#08a808; }
  .err { color:#ef4444; font-size:13px; margin-bottom:12px; }
</style>
</head>
<body>
<div class="card">
  <div class="logo"><span>C</span> ChannelView</div>
  <h2>This report is password protected</h2>
  <p>Enter the password to view this candidate report.</p>
  {% if error %}<p class="err">{{ error }}</p>{% endif %}
  <form method="POST" action="/report/{{ token }}">
    <input type="password" name="password" placeholder="Enter password" required autofocus>
    <button type="submit">View Report</button>
  </form>
</div>
</body>
</html>
