<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChannelView</title>
<link rel="stylesheet" href="/static/css/app.css">
</head>
<body>
<div class="app-layout">
  <!-- Mobile menu toggle -->
  <button class="mobile-menu-btn" onclick="toggleMobileSidebar()">&#9776;</button>
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleMobileSidebar()"></div>
  <!-- Sidebar -->
  <aside class="sidebar" id="app-sidebar">
    <div class="sidebar-header">
      <a href="/dashboard" class="logo"><span>C</span> ChannelView</a>
      <div class="beta-badge">BETA</div>
      <button id="notif-bell" onclick="toggleNotifPanel()" class="notif-bell" title="Notifications" style="position:relative;background:none;border:none;cursor:pointer;margin-left:auto;padding:4px 6px">
        <svg viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="2" width="20" height="20"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        <span id="notif-badge" style="display:none;position:absolute;top:-2px;right:-2px;background:#dc2626;color:#fff;font-size:10px;font-weight:700;min-width:16px;height:16px;border-radius:8px;align-items:center;justify-content:center"></span>
      </button>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section" style="padding:4px 12px">
        <a href="/global-search" class="nav-item {{ 'active' if page=='global-search' }}" data-page="global-search" style="background:#f3f4f6;border-radius:6px;color:#999;font-size:13px;padding:6px 12px;display:flex;align-items:center;gap:6px">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          Search...
        </a>
      </div>

      <!-- ========== MAIN NAV (5 primary items) ========== -->
      <div class="nav-section">
        <a href="/dashboard" class="nav-item {{ 'active' if page=='dashboard' }}" data-page="dashboard">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          Dashboard
        </a>
        <a href="/jobs-manage" class="nav-item {{ 'active' if page in ('jobs-manage','job-detail','interviews','interview_builder','interview_detail','candidate-experience') }}" data-page="jobs-manage">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/><line x1="12" y1="12" x2="12" y2="12.01"/></svg>
          My Jobs
        </a>
        <a href="/enhanced-kanban" class="nav-item {{ 'active' if page in ('candidates','enhanced-kanban','review','review-hub') }}" data-page="enhanced-kanban">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          Candidates
        </a>
        <a href="/campaigns" class="nav-item {{ 'active' if page in ('campaigns','lead-sourcing','referral-links','voice-agent') }}" data-page="campaigns">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M22 2L11 13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          Outreach
        </a>
        <a href="/analytics" class="nav-item {{ 'active' if page in ('analytics','pipeline-funnel','source-tracking','ai') }}" data-page="analytics">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
          Insights
        </a>
      </div>

      <!-- ========== SETTINGS (separated) ========== -->
      <div class="nav-section" style="margin-top:8px;padding-top:8px;border-top:1px solid #2a2a2a">
        <a href="/settings" class="nav-item {{ 'active' if page in ('settings','branding','email-templates','email-delivery','team','integrations','integrations-hub','ams-integrations','api-management') }}" data-page="settings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          Settings
        </a>
      </div>

      <!-- ========== ADMIN (FMO only) ========== -->
      {% if user.is_fmo_admin %}
      <div class="nav-section" style="margin-top:8px;padding-top:8px;border-top:1px solid #2a2a2a">
        <div class="nav-label" style="font-size:10px;text-transform:uppercase;letter-spacing:1px;color:#666;padding:4px 16px">Admin</div>
        <a href="/fmo" class="nav-item {{ 'active' if page=='fmo' }}" data-page="fmo">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          Agencies
        </a>
        <a href="/admin-analytics" class="nav-item {{ 'active' if page in ('admin-analytics','analytics-dashboard','ai-scoring','ai-insights') }}" data-page="admin-analytics">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/></svg>
          Platform Analytics
        </a>
        <a href="/system" class="nav-item {{ 'active' if page in ('system','audit','activity-log','compliance','notification-settings','security') }}" data-page="system">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
          System Monitor
        </a>
      </div>
      {% endif %}

      <!-- ========== ACCOUNT ========== -->
      <div class="nav-section">
        <a href="/profile-settings" class="nav-item {{ 'active' if page in ('profile-settings','security-settings') }}" data-page="profile-settings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          My Profile
        </a>
        <a href="/billing" class="nav-item {{ 'active' if page=='billing' }}" data-page="billing">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
          Billing
        </a>
        <a href="/help-center" class="nav-item {{ 'active' if page=='help-center' }}" data-page="help-center">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          Help
        </a>
      </div>
    </nav>
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="avatar">{{ user.name[0] }}</div>
        <div>
          <div class="user-name">{{ user.name }}</div>
          <div class="user-agency">{{ user.agency_name or 'My Agency' }}</div>
        </div>
      </div>
      <button onclick="logout()" class="logout-btn" title="Sign out">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <div id="page-content">
      <!-- Dynamic content loads here -->
      <div class="loading-spinner"><div class="spinner"></div>Loading...</div>
    </div>
  </main>
</div>

<!-- Notification Panel -->
<div id="notif-panel" style="display:none;position:fixed;top:0;right:0;width:380px;height:100vh;background:#fff;box-shadow:-4px 0 20px rgba(0,0,0,.15);z-index:1001;overflow-y:auto">
  <div style="padding:16px 20px;border-bottom:1px solid #e5e7eb;display:flex;justify-content:space-between;align-items:center">
    <h3 style="font-size:16px;font-weight:600">Notifications</h3>
    <div style="display:flex;gap:8px;align-items:center">
      <button onclick="markAllNotifRead()" class="btn btn-sm btn-outline" style="font-size:12px;padding:4px 10px">Mark all read</button>
      <button onclick="clearReadNotifs()" class="btn btn-sm btn-outline" style="font-size:12px;padding:4px 10px">Clear read</button>
      <button onclick="toggleNotifPanel()" style="background:none;border:none;cursor:pointer;font-size:20px;color:#999">&times;</button>
    </div>
  </div>
  <div id="notif-list" style="padding:8px"></div>
</div>
<div id="notif-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.2);z-index:1000" onclick="toggleNotifPanel()"></div>

<!-- Toast container -->
<div id="toast-container"></div>

<!-- Global data from server -->
<script>
const APP_USER = {{ user | tojson }};
const APP_PAGE = "{{ page }}";
const EXTRA_ID = "{{ interview_id if interview_id is defined else (candidate_id if candidate_id is defined else '') }}";
</script>
<script src="/static/js/app.js?v=c43b"></script>
</body>
</html>
