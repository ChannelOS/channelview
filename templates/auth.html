<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ 'Sign In' if mode == 'login' else 'Create Account' }} - ChannelView</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f4f5f7;min-height:100vh;display:flex;align-items:center;justify-content:center}
.auth-container{width:100%;max-width:440px;padding:24px}
.auth-logo{text-align:center;margin-bottom:32px}
.auth-logo a{font-size:28px;font-weight:800;color:#111;text-decoration:none;display:inline-flex;align-items:center;gap:10px}
.auth-logo span{display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;background:#0ace0a;color:#000;border-radius:8px;font-weight:900;font-size:20px}
.auth-card{background:#fff;border-radius:12px;padding:40px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.auth-card h2{font-size:24px;margin-bottom:8px}
.auth-card .subtitle{color:#666;margin-bottom:28px;font-size:14px}
.form-group{margin-bottom:18px}
.form-group label{display:block;font-size:13px;font-weight:600;margin-bottom:6px;color:#333}
.form-group input{width:100%;padding:12px 14px;border:1px solid #d1d5db;border-radius:8px;font-size:14px;transition:border .2s}
.form-group input:focus{outline:none;border-color:#0ace0a;box-shadow:0 0 0 3px rgba(10,206,10,.1)}
.btn{width:100%;padding:14px;border-radius:8px;font-weight:600;font-size:15px;cursor:pointer;border:none;transition:all .2s;margin-top:8px}
.btn-primary{background:#0ace0a;color:#000}
.btn-primary:hover{background:#08a808}
.btn-primary:disabled{opacity:.6;cursor:not-allowed}
.auth-footer{text-align:center;margin-top:20px;font-size:14px;color:#666}
.auth-footer a{color:#0ace0a;text-decoration:none;font-weight:600}
.error-msg{background:#fee2e2;color:#dc2626;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;display:none}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
</style>
</head>
<body>
<div class="auth-container">
  <div class="auth-logo"><a href="/"><span>C</span> ChannelView</a></div>
  <div class="auth-card">
    {% if mode == 'login' %}
    <h2>Welcome back</h2>
    <p class="subtitle">Sign in to your ChannelView account</p>
    <div class="error-msg" id="error"></div>
    <form id="authForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" required placeholder="you@agency.com" autofocus>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" required placeholder="Enter your password">
      </div>
      <button type="submit" class="btn btn-primary" id="submitBtn">Sign In</button>
    </form>
    <div class="auth-footer">
      Don't have an account? <a href="/register">Create one free</a>
    </div>
    {% else %}
    <h2>Create your account</h2>
    <p class="subtitle">Start screening candidates in minutes</p>
    <div class="error-msg" id="error"></div>
    <form id="authForm" onsubmit="handleRegister(event)">
      <div class="form-row">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="name" required placeholder="John Smith" autofocus>
        </div>
        <div class="form-group">
          <label>Agency Name</label>
          <input type="text" id="agency" placeholder="Acme Insurance">
        </div>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" required placeholder="you@agency.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" required placeholder="At least 8 characters" minlength="8">
      </div>
      <button type="submit" class="btn btn-primary" id="submitBtn">Create Account</button>
    </form>
    <div class="auth-footer">
      Already have an account? <a href="/login">Sign in</a>
    </div>
    {% endif %}
  </div>
</div>
<script>
const errEl = document.getElementById('error');
const btn = document.getElementById('submitBtn');

async function handleLogin(e) {
  e.preventDefault();
  errEl.style.display = 'none';
  btn.disabled = true; btn.textContent = 'Signing in...';
  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        email: document.getElementById('email').value,
        password: document.getElementById('password').value
      })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Login failed');
    window.location.href = '/dashboard';
  } catch (err) {
    errEl.textContent = err.message; errEl.style.display = 'block';
    btn.disabled = false; btn.textContent = 'Sign In';
  }
}

async function handleRegister(e) {
  e.preventDefault();
  errEl.style.display = 'none';
  btn.disabled = true; btn.textContent = 'Creating account...';
  try {
    const res = await fetch('/api/auth/register', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        password: document.getElementById('password').value,
        agency_name: document.getElementById('agency')?.value || ''
      })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Registration failed');
    window.location.href = '/dashboard';
  } catch (err) {
    errEl.textContent = err.message; errEl.style.display = 'block';
    btn.disabled = false; btn.textContent = 'Create Account';
  }
}
</script>
</body>
</html>
