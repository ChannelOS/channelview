# mychannelview.com - HTTP -> HTTPS
server {
    listen 80;
    server_name mychannelview.com www.mychannelview.com;
    return 301 https://$host$request_uri;
}

# mychannelview.com - HTTPS -> Flask app (ChannelView)
server {
    listen 443 ssl;
    server_name mychannelview.com www.mychannelview.com;
    ssl_certificate /etc/letsencrypt/live/mychannelview.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mychannelview.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    client_max_body_size 500M;
    location / {
        proxy_pass http://channelview:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }
}

# channelcareers.io - HTTP -> HTTPS
server {
    listen 80;
    server_name channelcareers.io www.channelcareers.io;
    return 301 https://$host$request_uri;
}

# channelcareers.io - HTTPS -> static landing + API proxy
server {
    listen 443 ssl;
    server_name channelcareers.io www.channelcareers.io;
    ssl_certificate /etc/letsencrypt/live/channelcareers.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/channelcareers.io/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    client_max_body_size 10M;

    root /usr/share/nginx/html/careers;
    index index.html;

    # Proxy /api/public/* to the Flask backend so the landing-page
    # apply form can POST to /api/public/apply-inbound from same origin
    # (avoids CORS entirely).
    location /api/public/ {
        proxy_pass http://channelview:5000;
        proxy_set_header Host mychannelview.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 30s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
